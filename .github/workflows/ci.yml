name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  clang-format:
    name: Auto-format C++ code
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install clang-format
        run: sudo apt-get install -y clang-format-18

      - name: Run clang-format
        run: git ls-files | grep -E '\.(cpp|h)$' | xargs clang-format-18 -i

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -A
            git commit -m "style: apply clang-format"
            git push
          fi

  clang-tidy:
    name: clang-tidy static analysis
    needs: clang-format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Install clang-tidy
        run: sudo apt-get install -y clang-tidy-18

      - name: Install Conan
        run: pip install "conan>=2.0,<3"

      - name: Set up Conan profile
        run: conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v6
        with:
          path: ~/.conan2/p
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.txt') }}

      - name: Install dependencies
        run: conan install . --build=missing -s build_type=Release -s compiler.cppstd=17 -c tools.cmake.cmaketoolchain:generator=Ninja --output-folder out/conan

      - name: Configure (generate compile_commands.json)
        run: cmake --preset conan-release -DBUILD_TESTING=ON -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DWARNINGS_AS_ERRORS=ON

      - name: Run clang-tidy
        run: |
          COMPILE_DB=$(find . -name compile_commands.json -not -path './.git/*' | head -1)
          git ls-files | grep -E '\.(cpp|h)$' | \
            xargs clang-tidy-18 --config-file=clang-tidy.txt -p "$(dirname "$COMPILE_DB")"

  build:
    name: Build & Test on ${{ matrix.os }}
    needs: clang-format
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Install Conan
        run: pip install "conan>=2.0,<3"

      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Conan profile
        run: conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v6
        with:
          path: ~/.conan2/p
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.txt') }}

      - name: Install dependencies
        run: conan install . --build=missing -s build_type=Release -s compiler.cppstd=17 -c tools.cmake.cmaketoolchain:generator=Ninja --output-folder out/conan

      - name: Configure
        run: cmake --preset conan-release -DBUILD_TESTING=ON -DWARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build --preset conan-release

      - name: Test
        run: ctest --preset conan-release

      - name: Run example (Windows)
        if: runner.os == 'Windows'
        run: out\conan\fibonacci_hello_world.exe

      - name: Run example (Linux)
        if: runner.os == 'Linux'
        run: ./out/conan/fibonacci_hello_world
