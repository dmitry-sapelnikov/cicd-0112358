name: CI

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  clang-format:
    name: Auto-format C++ code
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install clang-format
        run: sudo apt-get install -y clang-format-18

      - name: Run clang-format
        run: git ls-files | grep -E '\.(cpp|h)$' | xargs clang-format-18 -i

      - name: Commit and push if changed
        run: |
          git config user.name "Dmitry Sapelnikov"
          git config user.email "dmitry.sapelnikov@gmail.com"
          if ! git diff --quiet; then
            git add -A
            git commit -m "style: apply clang-format"
            git push
          fi

  build:
    name: Build & Test on ${{ matrix.os }}
    needs: clang-format
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}

      - name: Install Conan
        run: pip install conan

      - name: Set up Conan profile
        run: conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-${{ runner.os }}-${{ hashFiles('conanfile.txt') }}

      - name: Configure
        run: cmake -B out -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Build
        run: cmake --build out

      - name: Test
        run: ctest --test-dir out --output-on-failure

      - name: Run example (Windows)
        if: runner.os == 'Windows'
        run: out\fibonacci_hello_world.exe

      - name: Run example (Linux)
        if: runner.os == 'Linux'
        run: ./out/fibonacci_hello_world
